  .node-title { font-size: 16px; font-weight: 700; color: #e2e8f0; margin-bottom: 6px; }

  .node-files li::before { content: "·"; position: absolute; left: 0; color: #a78bfa; }

  .connections-list { font-size: 12px; }
  .conn-item { padding: 6px 8px; background: #252836; border-radius: 6px; margin: 4px 0; display: flex; justify-content: space-between; align-items: center; }

  .conn-rel { color: #64748b; font-size: 11px; }

  .type-INFERRED { background: #3b1f5e; color: #c084fc; }
  .type-AMBIGUOUS { background: #3b2f1f; color: #fb923c; }

  .stat-card { background: #252836; border-radius: 8px; padding: 10px; text-align: center; }
  .stat-num { font-size: 22px; font-weight: 700; color: #a78bfa; }
  .stat-label { font-size: 11px; color: #64748b; margin-top: 2px; }

  .legend { display: flex; flex-direction: column; gap: 6px; }
  .legend-item { display: flex; align-items: center; gap: 8px; font-size: 12px; }
  .legend-dot { width: 12px; height: 12px; border-radius: 50%; flex-shrink: 0; }

  .placeholder { color: #4a5568; font-size: 13px; text-align: center; padding: 20px 0; }

  .tooltip { position: absolute; background: #1a1d27; border: 1px solid #3d4166; border-radius: 8px; padding: 8px 12px; font-size: 12px; pointer-events: none; z-index: 100; max-width: 200px; display: none; }

  if (!adjacency[e.source]) adjacency[e.source] = [];
  if (!adjacency[e.target]) adjacency[e.target] = [];
  adjacency[e.source].push({node: e.target, relation: e.relation, type: e.type});
  adjacency[e.target].push({node: e.source, relation: e.relation + "(反)", type: e.type});
});

  label: n.label,
  title: n.community,
  value: n.degree,
  color: {
    background: communityColors[n.community] || "#6366f1",
    border: n.type === "INFERRED" ? "#c084fc" : communityColors[n.community],
    highlight: { background: "#fff", border: communityColors[n.community] }
  },
  font: { color: "#fff", size: Math.max(11, Math.min(16, 9 + n.degree * 0.4)) },
  borderWidth: n.type === "INFERRED" ? 2 : 1,
  borderDashes: n.type === "INFERRED" ? [4, 2] : false,
  community: n.community,
  degree: n.degree,
  nodeType: n.type,
  files: n.files
})));

const visEdges = new vis.DataSet(graphData.edges.map((e, i) => ({
  id: i,
  from: e.source,
  to: e.target,
  label: e.relation,
  title: e.relation,
  color: {
    color: e.type === "INFERRED" ? "#6d28d9" : "#3d4166",
    highlight: "#a78bfa",
    opacity: e.type === "INFERRED" ? 0.5 : 0.8
  },
  dashes: e.type === "INFERRED",
  width: e.weight || 1,
  font: { color: "#64748b", size: 10, align: "middle" },
  arrows: { to: { enabled: true, scaleFactor: 0.5 } },
  smooth: { type: "curvedCW", roundness: 0.1 },
  edgeType: e.type
})));

const container = document.getElementById("network");

  physics: {
    enabled: true,
    forceAtlas2Based: {
      gravitationalConstant: -60,
      centralGravity: 0.005,
      springLength: 120,
      springConstant: 0.08,
      damping: 0.4,
      avoidOverlap: 0.8
    },
    solver: "forceAtlas2Based",
    stabilization: { iterations: 200 }
  },
  interaction: {
    hover: true,
    tooltipDelay: 200,
    zoomView: true,
    dragView: true
  },
  nodes: {
    shape: "dot",
    scaling: { min: 10, max: 40, label: { enabled: true } }
  },
  edges: {
    smooth: { enabled: true, type: "dynamic" }
  }
});

    const detail = document.getElementById("node-detail");
    detail.classList.add("visible");

    document.getElementById("nd-title").textContent = node.label;
    const comm = document.getElementById("nd-community");
    comm.textContent = node.community;
    comm.style.background = communityBg[node.community] || "#1e1b4b";
    comm.style.color = communityColors[node.community] || "#6366f1";
    document.getElementById("nd-degree").textContent = `连接度: ${node.degree} · 类型: ${node.type}`;

    const filesEl = document.getElementById("nd-files");
    if (node.files && node.files.length > 0) {
      filesEl.innerHTML = "<ul class='node-files'>" + node.files.map(f => `<li>${f}</li>`).join("") + "</ul>";
    } else {
      filesEl.innerHTML = "";
    }

    // Connections
    const conns = adjacency[nodeId] || [];
    const connList = document.getElementById("connections-list");
    if (conns.length === 0) {
      connList.innerHTML = '<div class="placeholder">无关联节点</div>';
    } else {
      connList.innerHTML = conns.map(c =>
        `<div class="conn-item">
          <span class="conn-label">${c.node}</span>
          <span>
            <span class="conn-rel">${c.relation}</span>
            <span class="conn-type type-${c.type}">${c.type}</span>
          </span>
        </div>`
      ).join("");
    }
  }
});

// Search
let activeFilter = null;
function filterNodes(query) {
  const q = query.toLowerCase().trim();
  visNodes.forEach(n => {
    const match = !q || n.id.toLowerCase().includes(q) || n.label.toLowerCase().includes(q);
    const communityMatch = !activeFilter || n.community === activeFilter;
    visNodes.update({ id: n.id, hidden: !(match && communityMatch) });
  });
}

// Community filters
const communities = [...new Set(graphData.nodes.map(n => n.community))];
const filtersEl = document.getElementById("filters");
communities.forEach(c => {
  const btn = document.createElement("button");
  btn.className = "filter-btn active";
  btn.textContent = c;
  btn.style.borderColor = communityColors[c];
  btn.style.color = communityColors[c];
  btn.style.background = communityBg[c] || "transparent";
  btn.onclick = () => {
    if (activeFilter === c) {
      activeFilter = null;
      document.querySelectorAll(".filter-btn").forEach(b => b.classList.add("active"));
    } else {
      activeFilter = c;
      document.querySelectorAll(".filter-btn").forEach(b => {
        b.classList.toggle("active", b.textContent === c);
      });
    }
    filterNodes(document.getElementById("search").value);
  };
  filtersEl.appendChild(btn);
});
</script>
</body>
